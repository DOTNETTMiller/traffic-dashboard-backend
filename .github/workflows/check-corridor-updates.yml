# GitHub Action to automatically check for corridor geometry updates
# Runs monthly and creates an issue if updates are needed

name: Check Interstate Corridor Updates

on:
  # Run on the 1st of every month at 2 AM UTC
  schedule:
    - cron: '0 2 1 * *'

  # Allow manual trigger
  workflow_dispatch:

jobs:
  check-updates:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '18'

      - name: Install dependencies
        run: |
          npm install pg axios

      - name: Check for corridor updates
        id: check
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          node scripts/check_corridor_updates.js > check_output.txt 2>&1
          EXIT_CODE=$?
          cat check_output.txt

          # Parse output for counts
          NEEDS_UPDATE=$(grep -oP "Needs update.*?\K\d+" check_output.txt || echo "0")
          SIGNIFICANT=$(grep -oP "Significant update needed.*?\K\d+" check_output.txt || echo "0")

          echo "exit_code=$EXIT_CODE" >> $GITHUB_OUTPUT
          echo "needs_update=$NEEDS_UPDATE" >> $GITHUB_OUTPUT
          echo "significant=$SIGNIFICANT" >> $GITHUB_OUTPUT
          echo "output<<EOF" >> $GITHUB_OUTPUT
          cat check_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create database backup before auto-update
        id: backup
        if: |
          steps.check.outputs.exit_code == '1' &&
          steps.check.outputs.significant == '0' &&
          steps.check.outputs.needs_update != '0' &&
          steps.check.outputs.needs_update < '6'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "📦 Creating backup before auto-update..."

          # Create backup SQL
          cat > backup_corridors.sql << 'EOFBACKUP'
          -- Backup corridors table before auto-update
          CREATE TABLE IF NOT EXISTS corridors_backup_$(date +%Y%m%d) AS
          SELECT * FROM corridors WHERE name LIKE 'I-%';
          EOFBACKUP

          # Execute backup (using psql if available, or note for manual backup)
          if command -v psql &> /dev/null; then
            psql "$DATABASE_URL" < backup_corridors.sql
            echo "backup_created=true" >> $GITHUB_OUTPUT
          else
            echo "backup_created=false" >> $GITHUB_OUTPUT
            echo "⚠️  psql not available - backup SQL saved to artifact"
          fi

      - name: Auto-update corridors (safe mode)
        id: autoupdate
        if: |
          steps.check.outputs.exit_code == '1' &&
          steps.check.outputs.significant == '0' &&
          steps.check.outputs.needs_update != '0' &&
          steps.check.outputs.needs_update < '6'
        env:
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
        run: |
          echo "🤖 AUTO-UPDATE MODE: Safe to update (minor changes only)"
          echo "   Corridors needing update: ${{ steps.check.outputs.needs_update }}"
          echo "   Significant updates: ${{ steps.check.outputs.significant }}"
          echo ""

          # Run the update
          node scripts/fetch_all_interstate_geometries.js > update_output.txt 2>&1
          UPDATE_EXIT=$?

          cat update_output.txt

          if [ $UPDATE_EXIT -eq 0 ]; then
            echo "✅ Auto-update completed successfully"
            echo "update_success=true" >> $GITHUB_OUTPUT
          else
            echo "❌ Auto-update failed"
            echo "update_success=false" >> $GITHUB_OUTPUT
          fi

          echo "update_output<<EOF" >> $GITHUB_OUTPUT
          cat update_output.txt >> $GITHUB_OUTPUT
          echo "EOF" >> $GITHUB_OUTPUT
        continue-on-error: true

      - name: Create success notification issue
        if: |
          steps.autoupdate.outputs.update_success == 'true'
        uses: actions/github-script@v6
        with:
          script: |
            const needsUpdate = '${{ steps.check.outputs.needs_update }}';
            const updateOutput = '${{ steps.autoupdate.outputs.update_output }}';
            const backupCreated = '${{ steps.backup.outputs.backup_created }}';

            const title = '✅ Interstate Corridors Auto-Updated Successfully';

            let body = '## ✅ Automated Corridor Update - Success\n\n';
            body += 'The monthly automated update has successfully refreshed interstate corridor geometries from OpenStreetMap.\n\n';
            body += '### Summary\n';
            body += '- **Corridors Updated:** ' + needsUpdate + '\n';
            body += '- **Update Type:** Minor changes (auto-approved)\n';
            body += '- **Update Date:** ' + new Date().toLocaleString() + '\n';
            body += '- **Backup Created:** ' + (backupCreated === 'true' ? 'Yes' : 'Noted in artifacts') + '\n\n';
            body += '### What Was Updated\n';
            body += 'The following corridors had minor geometry improvements from OpenStreetMap:\n';
            body += '- New construction projects reflected\n';
            body += '- Route accuracy improvements\n';
            body += '- Updated interchange data\n\n';
            body += '### Safety Checks Passed\n';
            body += '- ✅ No significant updates (>180 days) detected\n';
            body += '- ✅ Less than 6 corridors needed updating\n';
            body += '- ✅ All updates were recent/minor changes\n';
            body += '- ✅ Database backup created before update\n\n';
            body += '### Verification\n';
            body += 'You can verify the updates in the application:\n';
            body += '1. Navigate to the map view\n';
            body += '2. Check TETC Corridors layer\n';
            body += '3. Corridors should display with updated geometry\n\n';
            body += '### Rollback (if needed)\n';
            body += 'If you notice any issues, you can rollback:\n\n';
            body += '```sql\n';
            body += '-- List available backups\n';
            body += 'SELECT tablename FROM pg_tables\n';
            body += "WHERE tablename LIKE 'corridors_backup_%'\n";
            body += 'ORDER BY tablename DESC;\n\n';
            body += '-- Rollback to backup (replace date)\n';
            body += 'BEGIN;\n';
            body += "DELETE FROM corridors WHERE name LIKE 'I-%';\n";
            body += 'INSERT INTO corridors\n';
            body += 'SELECT * FROM corridors_backup_YYYYMMDD;\n';
            body += 'COMMIT;\n';
            body += '```\n\n';
            body += '### Full Update Log\n\n';
            body += '<details>\n';
            body += '<summary>Click to expand update output</summary>\n\n';
            body += '```\n';
            body += updateOutput;
            body += '\n```\n\n';
            body += '</details>\n\n';
            body += '---\n';
            body += '*This update was performed automatically by the corridor monitoring system. Updates are only automated for minor changes (<180 days old, <6 corridors). Significant changes require manual approval.*';

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['automated', 'data-quality', 'success']
            });

      - name: Create issue for SIGNIFICANT updates (manual approval required)
        if: |
          steps.check.outputs.exit_code == '1' &&
          (steps.check.outputs.significant != '0' || steps.check.outputs.needs_update >= '6')
        uses: actions/github-script@v6
        with:
          script: |
            const output = '${{ steps.check.outputs.output }}';

            // Parse output to extract summary
            const needsUpdateMatch = output.match(/Needs update.*?(\d+) corridors/);
            const significantMatch = output.match(/Significant update needed.*?(\d+) corridors/);

            const needsUpdate = needsUpdateMatch ? parseInt(needsUpdateMatch[1]) : 0;
            const significant = significantMatch ? parseInt(significantMatch[1]) : 0;

            const title = significant > 0
              ? '🔴 Interstate Corridor Geometries Need MANUAL Update (Significant Changes)'
              : '⚠️ Interstate Corridor Geometries Need MANUAL Update (Too Many Changes)';

            let body = '## ⚠️ Corridor Geometry Update Requires MANUAL Approval\n\n';
            body += 'The automated monthly check has detected **significant changes** or **too many corridors** needing updates.\n\n';
            body += '**Automatic update was SKIPPED** - manual review and approval required for safety.\n\n';
            body += '### Why Manual Approval?\n';

            if (significant > 0) {
              body += '- 🔴 **Significant updates detected** (' + significant + ' corridors >180 days old)\n';
              body += '- Major route changes may require verification\n';
              body += '- Could indicate construction projects or realignments\n';
            }

            if (needsUpdate >= 6) {
              body += '- ⚠️ **Many corridors need updating** (' + needsUpdate + ' corridors)\n';
              body += '- Bulk update should be reviewed\n';
              body += '- May indicate widespread OSM improvements\n';
            }

            body += '\n### Summary\n';
            body += '- **Needs Update (30-180 days old):** ' + needsUpdate + ' corridors\n';
            body += '- **Significant Update (>180 days old):** ' + significant + ' corridors\n\n';
            body += '### What This Means\n';
            body += 'OpenStreetMap data for these interstates has been updated with:\n';
            body += '- Construction/realignment projects\n';
            body += '- Improved route accuracy\n';
            body += '- New interchange data\n';
            body += '- Route corrections\n\n';
            body += '### Manual Update Required\n\n';
            body += '**Review the changes**, then run the update script on Railway:\n\n';
            body += '```bash\n';
            body += 'railway run node scripts/fetch_all_interstate_geometries.js\n';
            body += '```\n\n';
            body += 'This will:\n';
            body += '- Fetch latest OSM data for all interstates\n';
            body += '- Update corridor geometries with improved accuracy\n';
            body += '- Maintain split highway separation (EB/WB, NB/SB)\n';
            body += '- Take ~10 minutes to complete\n\n';
            body += '### Safety Notes\n';
            body += '- Automatic updates only occur for minor changes (<6 corridors, <180 days)\n';
            body += '- This requires manual approval to ensure data quality\n';
            body += '- A backup will be created automatically during manual update\n\n';
            body += '### Full Check Output\n\n';
            body += '<details>\n';
            body += '<summary>Click to expand detailed results</summary>\n\n';
            body += '```\n';
            body += output;
            body += '\n```\n\n';
            body += '</details>\n\n';
            body += '### More Information\n';
            body += 'See `docs/CORRIDOR_GEOMETRY_FIX.md` for complete documentation.\n\n';
            body += '---\n';
            body += '*This issue was automatically created by the corridor update checker. It runs monthly on the 1st of each month.*';

            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: title,
              body: body,
              labels: ['maintenance', 'data-quality', 'automated']
            });

      - name: Update check successful
        if: steps.check.outputs.exit_code == '0'
        run: |
          echo "✅ All corridor geometries are up to date!"
          echo "No action needed at this time."
