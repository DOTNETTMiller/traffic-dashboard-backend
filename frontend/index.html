<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />

    <!-- Mobile viewport configuration -->
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes" />

    <!-- PWA Meta Tags -->
    <meta name="application-name" content="Matt's Experimental Sandbox" />
    <meta name="description" content="Real-time traffic monitoring and corridor communication dashboard for state DOTs" />
    <meta name="theme-color" content="#2563eb" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
    <meta name="apple-mobile-web-app-title" content="Matt's Sandbox" />

    <!-- Microsoft Tiles -->
    <meta name="msapplication-TileColor" content="#2563eb" />
    <meta name="msapplication-TileImage" content="/icons/icon-144x144.png" />

    <title>Matt's Experimental Sandbox</title>

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json" />

    <!-- Favicon -->
    <link rel="icon" type="image/x-icon" href="/favicon.ico" />
    <link rel="icon" type="image/png" sizes="32x32" href="/icons/icon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="/icons/icon-16x16.png" />

    <!-- Apple Touch Icons -->
    <link rel="apple-touch-icon" sizes="180x180" href="/icons/icon-180x180.png" />
    <link rel="apple-touch-icon" sizes="152x152" href="/icons/icon-152x152.png" />
    <link rel="apple-touch-icon" sizes="144x144" href="/icons/icon-144x144.png" />
    <link rel="apple-touch-icon" sizes="120x120" href="/icons/icon-120x120.png" />
    <link rel="apple-touch-icon" sizes="114x114" href="/icons/icon-114x114.png" />
    <link rel="apple-touch-icon" sizes="76x76" href="/icons/icon-76x76.png" />
    <link rel="apple-touch-icon" sizes="72x72" href="/icons/icon-72x72.png" />
    <link rel="apple-touch-icon" href="/icons/icon-192x192.png" />

    <!-- Typography: Inter Tight (SF-adjacent display), JetBrains Mono for IDs/coords -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Inter+Tight:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap"
    />

    <!-- Leaflet CSS -->
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />

    <!-- Mobile-friendly styles -->
    <style>
      * {
        -webkit-tap-highlight-color: rgba(0, 0, 0, 0.1);
        -webkit-touch-callout: none;
      }

      html, body {
        margin: 0;
        padding: 0;
        width: 100%;
        height: 100%;
        overflow-x: hidden;
        -webkit-font-smoothing: antialiased;
        -moz-osx-font-smoothing: grayscale;
      }

      body {
        touch-action: manipulation;
      }

      #root {
        width: 100%;
        min-height: 100vh;
      }

      /* Ensure touch-friendly buttons */
      button, a, input, select {
        min-height: 44px;
        min-width: 44px;
      }

      /* Loading screen */
      .app-loading {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        background: #1d1d1f;
        color: #f5f5f7;
        font-family: 'Inter Tight', -apple-system, BlinkMacSystemFont,
          'SF Pro Display', sans-serif;
        letter-spacing: -0.022em;
      }

      .app-loading h1 {
        font-size: 18px;
        font-weight: 600;
        letter-spacing: -0.01em;
        margin-bottom: 24px;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 2px solid rgba(248, 250, 252, 0.15);
        border-top-color: #f8fafc;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      /* iOS safe area insets */
      @supports (padding: max(0px)) {
        body {
          padding-left: env(safe-area-inset-left);
          padding-right: env(safe-area-inset-right);
        }
      }
    </style>
  </head>
  <body>
    <div id="root">
      <div class="app-loading">
        <h1>Matt's Experimental Sandbox</h1>
        <div class="spinner"></div>
      </div>
    </div>
    <script type="module" src="./src/main.jsx"></script>

    <!-- Service Worker registration -->
    <script>
      (function() {
        if (!('serviceWorker' in navigator)) return;

        // Kill switch: append ?clear-sw=1 to any URL to unregister every service
        // worker for this origin and wipe caches. Useful if a deploy ever ships
        // a broken SW that's pinning users to stale code. Reload after.
        if (new URLSearchParams(window.location.search).has('clear-sw')) {
          Promise.all([
            navigator.serviceWorker.getRegistrations().then(regs =>
              Promise.all(regs.map(r => r.unregister()))
            ),
            ('caches' in window
              ? caches.keys().then(names => Promise.all(names.map(n => caches.delete(n))))
              : Promise.resolve())
          ]).then(() => {
            console.log('🗑️ Service workers unregistered and caches cleared. Reloading…');
            window.location.replace(window.location.pathname);
          });
          return;
        }

        // Normal path: register the SW after first paint so it doesn't compete
        // with critical resource loading. Network-first strategy means HTML/JS
        // are always fetched fresh when online; the cache is just a fallback.
        window.addEventListener('load', () => {
          navigator.serviceWorker.register('/service-worker.js')
            .then((registration) => {
              console.log('✅ ServiceWorker registered:', registration.scope);
              // Check for updates every minute while the tab is open.
              setInterval(() => { registration.update().catch(() => {}); }, 60_000);
            })
            .catch((err) => {
              console.warn('ServiceWorker registration failed:', err);
            });
        });
      })();

      // PWA install-prompt handling
      let deferredPrompt;
      window.addEventListener('beforeinstallprompt', (e) => {
        e.preventDefault();
        deferredPrompt = e;
        console.log('Install prompt available');
      });

      window.addEventListener('appinstalled', () => {
        console.log('PWA was installed');
        deferredPrompt = null;
      });
    </script>
  </body>
</html>
